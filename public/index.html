<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kiosk Checkpoint</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app">
      <div id="idle" class="screen">
        <h1>กรุณาสแกนบาร์โค้ด/QR บนใบนำทาง</h1>
        <p class="hint">ถือใบนำทางให้กล้อง/เครื่องสแกนอ่าน</p>
      </div>

      <div id="loading" class="screen hidden">
        <h1>กำลังค้นหาข้อมูล...</h1>
      </div>

      <div id="result" class="screen hidden">
        <div class="card">
          <div class="qno" id="qno">--</div>
          <div class="qinfo">
            <div id="qstn">สถานะ: -</div>
            <div id="location">สถานที่: -</div>
            <div id="qdate">วันที่: -</div>
            <div id="ost_name">ผล: -</div>
          </div>
        </div>
      </div>

      <div id="error" class="screen hidden">
        <h1 id="errMsg">เกิดข้อผิดพลาด</h1>
        <p>โปรดลองสแกนใหม่หรือแจ้งเจ้าหน้าที่</p>
      </div>

      <!-- Hidden input to receive scanner HID events if needed -->
      <input id="scanInput" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" class="hidden-input">
    </div>

    <script src="/app.js"></script>
  </body>
</html>
